# Paper Summary SFT Dataset 配置示例
# 展示如何在SFT训练中使用 PaperSummarySFTDataset

# 在SFT训练配置中，通过 custom_cls 指定自定义数据集类
data:
  # 训练数据文件路径（Parquet格式）
  train_files:
    - data/data_verl/paper_train.parquet

  # 验证数据文件路径（可选）
  val_files:
    - data/data_verl/paper_val.parquet

  # 指定自定义数据集类
  custom_cls:
    path: verl.utils.dataset.paper_summary_sft_dataset  # 模块路径
    name: PaperSummarySFTDataset                          # 类名

  # 数据集配置参数
  max_length: 5120           # 最大序列长度（prompt + response）
  max_prompt_length: 4096    # 最大prompt长度
  max_response_length: 1024  # 最大response长度
  truncation: "right"        # 截断策略: "error", "left", "right"
  pad_mode: "right"          # padding模式: "right", "no_padding"

  # 数据字段配置（可选，使用默认值）
  prompt_key: "prompt"                    # prompt字段名
  ground_truth_key: "ground_truth"        # ground_truth字段名
  ground_truth_dict_key: "ground_truth_dict"  # ground_truth_dict字段名
  data_source_key: "data_source"          # data_source字段名
  extra_info_key: "extra_info"            # extra_info字段名

  # 数据加载配置
  num_workers: 4             # 数据加载线程数
  train_batch_size: 32       # 训练批次大小
  train_max_samples: -1      # 最大训练样本数，-1表示使用全部
  val_max_samples: -1        # 最大验证样本数，-1表示使用全部

# 模型配置
model:
  model_path: "Qwen/Qwen3-4B-Instruct-2507"  # 模型路径
  tokenizer_path: "Qwen/Qwen3-4B-Instruct-2507"  # tokenizer路径

# 训练配置
trainer:
  total_epochs: 3            # 训练轮数
  total_training_steps: null # 总训练步数（null表示自动计算）
  save_freq: 100             # 保存频率（步）
  test_freq: 50              # 验证频率（步）

# 优化器配置
optim:
  lr: 1e-5                   # 学习率
  lr_scheduler: "cosine"     # 学习率调度器
  warmup_ratio: 0.05         # warmup比例
